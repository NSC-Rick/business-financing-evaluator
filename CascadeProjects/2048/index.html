<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>2048</h1>
            <div class="scores-container">
                <div class="score-container">
                    <div class="score-label">Score</div>
                    <div class="score" id="score">0</div>
                </div>
                <div class="score-container">
                    <div class="score-label">Best</div>
                    <div class="score" id="best">0</div>
                </div>
            </div>
        </header>
        
        <main>
            <div class="game-container">
                <div class="game-message" id="game-message">
                    <p></p>
                    <div class="lower">
                        <a class="retry-button" onclick="game.restart()">Try again</a>
                    </div>
                </div>
                
                <div class="grid-container">
                    <div class="grid-row">
                        <div class="grid-cell"></div>
                        <div class="grid-cell"></div>
                        <div class="grid-cell"></div>
                        <div class="grid-cell"></div>
                    </div>
                    <div class="grid-row">
                        <div class="grid-cell"></div>
                        <div class="grid-cell"></div>
                        <div class="grid-cell"></div>
                        <div class="grid-cell"></div>
                    </div>
                    <div class="grid-row">
                        <div class="grid-cell"></div>
                        <div class="grid-cell"></div>
                        <div class="grid-cell"></div>
                        <div class="grid-cell"></div>
                    </div>
                    <div class="grid-row">
                        <div class="grid-cell"></div>
                        <div class="grid-cell"></div>
                        <div class="grid-cell"></div>
                        <div class="grid-cell"></div>
                    </div>
                </div>
                
                <div class="tile-container" id="tile-container">
                </div>
            </div>
            
            <div class="game-explanation">
                <p class="game-intro">Join the tiles, get to <strong>2048!</strong></p>
                <p class="game-explanation-text">Use <strong>arrow keys</strong> or <strong>swipe</strong> to move tiles. When two tiles with the same number touch, they merge into one!</p>
            </div>
            
            <div class="restart-button" onclick="game.restart()">New Game</div>
        </main>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
